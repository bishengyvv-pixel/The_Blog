version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-/api}
    ports:
      - "10001:80"
    depends_on:
      - backend
    restart: unless-stopped
    container_name: the_blog_frontend
    networks:
      - blog_network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "10002:3001"
    environment:
      - PORT=${PORT:-3001}
      - NODE_ENV=${NODE_ENV:-production}
      - DEBUG=${DEBUG:-false}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
    volumes:
      - ./posts:/posts:ro
    restart: unless-stopped
    container_name: the_blog_backend
    networks:
      - blog_network

networks:
  blog_network:
    driver: bridge